<div>
  <model-view-rrb
    filename="RRB_Damme_Water.glb"
    [cam]="{x: -96, y: 40, z: 4}"
    [isSimulation]="true"
    [(waterLevel)]="waterLevel"
    [(simulationParameter)]="rainForecast"
    [intervalForecast]="intervalForecast()"
    [volume]="volume()"
    [catchmentArea]="catchmentArea()"
    [pavedArea]="pavedArea()"
    [unpavedArea]="unpavedArea()"
    [name]="name()"
    [city]="city()"
  />

  <water-level
    [(waterLevelSlider)]="waterLevelSlider"
    [(waterLevel)]="waterLevel"
  />

  <hr />

  <drain-throttle
    [(throttleSize)]="throttleSize"
    [(throttleHeight)]="throttleHeight"
  ></drain-throttle>

  <hr />

  <drainage-rules [(drainageRules)]="drainageRules"></drainage-rules>

  <hr />

  <rain-forecast
    [(intervalForecast)]="intervalForecast"
    [(rainForecast)]="rainForecast"
  />
</div>
