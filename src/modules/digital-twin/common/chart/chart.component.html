<div class="">
  <div class="">
    <p class="is-size-3 m-4" translate>{{ header() }}</p>
    <ng-container chart>
      <div class="is-fullwidth p-4">
        <div class="is-fullwidth" style="height: 22rem">
          @let options =
            {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                x: {
                  grid: {
                    display: false,
                  },
                },
                y: {
                  grid: {
                    display: false,
                  },
                  title: {
                    display: true,
                    text: text(),
                  },
                  beginAtZero: true,
                  suggestedMax: suggestedMax,
                },
              },
              plugins: {
                legend: {
                  display: false,
                },
              },
            };
          <canvas
            baseChart
            class="is-fullheight is-fullwidth"
            [data]="chartData()"
            [options]="options"
            [type]="chartType()"
          ></canvas>
        </div>
      </div>
    </ng-container>
  </div>
</div>
